<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkle.fun - Premium Update</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #1a1a1a; color: #f0f0f0; overflow-x: hidden; }

        /* --- SCROLLING LINES BACKGROUND --- */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(45deg, rgba(163, 143, 120, 0.05) 25%, transparent 25%, transparent 50%, rgba(163, 143, 120, 0.05) 50%, rgba(163, 143, 120, 0.05) 75%, transparent 75%, transparent);
            background-size: 50px 50px;
            animation: moveLines 4s linear infinite;
            z-index: -1;
            pointer-events: none;
        }
        @keyframes moveLines { from { background-position: 0 0; } to { background-position: 50px 50px; } }

        /* --- LIGHTBOX (IMAGE PREVIEW) --- */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; cursor: zoom-out; }
        #lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; box-shadow: 0 0 30px rgba(163, 143, 120, 0.3); }

        /* --- STYLING (KEEPING YOUR LAYOUT) --- */
        .top-bar { background-color: #a38f78; color: white; padding: 15px 30px; font-weight: 900; font-size: 1.4rem; position: fixed; top: 0; width: 100%; z-index: 1000; display: flex; justify-content: space-between; align-items: center; }
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; }
        .hero h1 { font-size: 5rem; text-shadow: 0 6px 15px rgba(0,0,0,0.9); }
        .scroll-btn { background-color: #a38f78; color: white; border: none; padding: 15px 40px; font-size: 1.2rem; border-radius: 50px; cursor: pointer; transition: 0.3s; margin-top: 20px; }
        
        .content-area { padding: 120px 40px; }
        .social-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; max-width: 900px; margin: 0 auto; }
        .social-pill { display: flex; align-items: center; background: #262626; border-radius: 60px; padding: 15px; text-decoration: none; border: 1px solid #444; transition: 0.3s; }
        .social-pill:hover { transform: scale(1.03); border-color: #a38f78; }

        .showcase-image { width: 100%; border-radius: 20px; cursor: zoom-in; transition: 0.4s; }
        .showcase-image:hover { transform: scale(1.01); box-shadow: 0 0 20px rgba(163, 143, 120, 0.2); }
    </style>
</head>
<body>

    <header class="top-bar"><span>Blinkle.fun</span></header>

    <section class="hero">
        <div>
            <h1>WELCOME TO BLINKLE.FUN!</h1>
            <button class="scroll-btn" onclick="document.getElementById('main-content').scrollIntoView({ behavior: 'smooth' })">Explore ↓</button>
        </div>
    </section>

    <main id="main-content" class="content-area">
        <div class="social-grid">
            <a href="https://discord.gg/xzTR7yYUQK" target="_blank" class="social-pill">...</a>
            <!-- Keep your existing social links here -->
        </div>
        
        <div class="showcase-container">
            <img src="images/wow.png" alt="Showcase" class="showcase-image" onclick="openLightbox(this.src)">
        </div>
    </main>

    <!-- Lightbox Element -->
    <div id="lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" src="" alt="Full Preview">
    </div>

    <script>
        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').style.display = 'flex';
        }
    </script>
</body>
</html>
