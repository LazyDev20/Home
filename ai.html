<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkle.fun - Premium Update</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <img id="scroll-char" src="images/belnooo.png" alt="Character">
    <header class="top-bar"><span>Blinkle.fun</span></header>

    <section class="hero">
        <div class="hero-content">
            <h1>WELCOME TO BLINKLE.FUN!</h1>
            <button class="scroll-btn" onclick="scrollToContent()">Explore <span>↓</span></button>
        </div>
    </section>

    <main id="main-content" class="content-area">
        <a href="https://your-link-here.com" class="clickable-area">
            <h2 class="section-title">Stay Connected</h2>
            <div class="social-grid">
                <div class="social-pill"><div class="social-icon"><img src="images/discord.png" alt="Discord"></div><div class="social-text"><h3>Discord Server</h3><p>Join the Belno Fan Club</p></div></div>
                <div class="social-pill"><div class="social-icon"><img src="images/steam.png" alt="Steam"></div><div class="social-text"><h3>Steam Profile</h3><p>Add me if you want!</p></div></div>
                <div class="social-pill"><div class="social-icon"><img src="images/tiktok.png" alt="TikTok"></div><div class="social-text"><h3>TikTok</h3><p>My tiktok account!</p></div></div>
                <div class="social-pill"><div class="social-icon"><img src="images/roblox.png" alt="Roblox"></div><div class="social-text"><h3>Roblox</h3><p>My roblox profile</p></div></div>
            </div>
        </a>
    </main>

    <footer class="bottom-bar">
        <div class="footer-logo">Blinkle.fun Premium</div>
        <p>&copy; 2026 Blinkle.fun</p>
    </footer>

    <script>
        function scrollToContent() { document.getElementById('main-content').scrollIntoView({ behavior: 'smooth' }); }
        window.addEventListener('scroll', function() {
            const char = document.getElementById('scroll-char');
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50) {
                char.classList.add('visible');
            } else {
                char.classList.remove('visible');
            }
        });
    </script>
</body>
</html>
