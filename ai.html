<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Tech Page</title>
    <style>
        /* CSS RESET */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* GLOBAL STYLES */
        body {
            background-color: #0d0e12;
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        /* Gradient background accents */
        body::before {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: #6366f1;
            filter: blur(150px);
            border-radius: 50%;
            top: 20%;
            left: 20%;
            opacity: 0.3;
            z-index: -1;
        }

        body::after {
            content: '';
            position: absolute;
            width: 300px;
            height: 300px;
            background: #a855f7;
            filter: blur(150px);
            border-radius: 50%;
            bottom: 20%;
            right: 20%;
            opacity: 0.2;
            z-index: -1;
        }

        /* CONTAINER/CARD */
        .container {
            width: 90%;
            max-width: 450px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 40px 30px;
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        .container:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.15);
            border-color: rgba(99, 102, 241, 0.3);
        }

        /* CONTENT */
        h1 {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin-bottom: 30px;
            background: linear-gradient(to right, #ffffff, #d1d5db);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Link Stack */
        .links-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Button/Link style */
        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            color: #f3f4f6;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .btn:hover {
            background: #f3f4f6;
            color: #0d0e12;
            transform: scale(1.02);
            border-color: #f3f4f6;
        }

        /* Special style for the first link */
        .btn:first-child {
            background: #6366f1;
            border-color: #6366f1;
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        .btn:first-child:hover {
            background: #4f46e5;
            border-color: #4f46e5;
            color: #ffffff;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Try it out</h1>
        
        <div class="links-stack">
            <a href="#" class="btn">View Demo</a>
            <a href="#" class="btn">Learn More</a>
            <a href="#" class="btn">Documentation</a>
            <a href="#" class="btn">Contact Sales</a>
        </div>
    </div>

</body>
</html>
