<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkle.fun</title>
    
    <!-- Importing the "Cooler" Modern Font (Poppins) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- GLOBAL SETTINGS --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            /* Added padding at the bottom so content isn't hidden behind the fixed bottom bar */
            padding-bottom: 60px; 
        }

        /* --- MODERN SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 12px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a; 
        }
        ::-webkit-scrollbar-thumb {
            background: #888; 
            border-radius: 6px;
            border: 3px solid #1a1a1a; /* Creates a padded look */
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #555; 
        }

        /* --- TOP BAR --- */
        .top-bar {
            background-color: #a38f78; /* Matches the beige/brown from your image */
            color: white;
            padding: 12px 20px;
            font-weight: 700;
            font-size: 1.2rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            
            /* Updated to look inside the "image" folder */
            background-image: url('images/image_93eb2c.png');
            
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* Adds a slight dark overlay so the text is easier to read */
            box-shadow: inset 0 0 0 2000px rgba(0, 0, 0, 0.3);
            position: relative;
            padding-top: 50px; /* Accounts for the top bar */
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 900;
            color: white;
            letter-spacing: 2px;
            
            /* Creates the black outline effect seen in your image */
            -webkit-text-stroke: 2px black;
            text-shadow: 4px 4px 8px rgba(0,0,0,0.7);
            margin-bottom: 10px;
        }

        .hero .scroll-text {
            font-size: 2rem;
            font-weight: 700;
            color: white;
            -webkit-text-stroke: 1.5px black;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.7);
            animation: bounce 2s infinite;
        }

        /* --- DUMMY CONTENT TO TEST SCROLLING --- */
        .content {
            padding: 100px 20px;
            text-align: center;
            min-height: 150vh; /* Forces the page to be long enough to scroll */
            background-color: #1a1a1a;
        }

        .content h2 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            color: #a38f78;
        }

        /* --- BOTTOM BAR --- */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            background-color: #0f0f0f;
            color: white;
            text-align: center;
            padding: 15px;
            font-size: 0.9rem;
            border-top: 2px solid #333;
            z-index: 1000;
        }

        /* --- ANIMATIONS --- */
        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-15px); }
            60% { transform: translateY(-7px); }
        }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2.5rem;
            }
            .hero .scroll-text {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <div class="top-bar">
        Blinkle.fun
    </div>

    <!-- Main Hero Image Section -->
    <header class="hero">
        <h1>WELCOME TO BLINKLE.FUN!</h1>
        <div class="scroll-text">Scroll down ↓</div>
    </header>

    <!-- Scrollable Content Area -->
    <main class="content">
        <h2>Keep Scrolling!</h2>
        <p>This space is here so you can test out the brand new modern scrollbar styling.</p>
    </main>

    <!-- Fixed Bottom Bar -->
    <div class="bottom-bar">
        &copy; 2026 Blinkle.fun | Modern UI Update
    </div>

</body>
</html>
