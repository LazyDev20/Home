<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkle.fun | Premium Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #d4af37; /* Refined Gold */
            --bg: #0a0a0a;
            --surface: #141414;
            --text: #ededed;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text); line-height: 1.6; }

        /* --- NAVIGATION --- */
        .top-bar { padding: 20px 50px; position: fixed; width: 100%; z-index: 1000; backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .logo { font-weight: 900; letter-spacing: 2px; color: var(--accent); font-size: 1.5rem; }

        /* --- HERO --- */
        .hero { height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; background: radial-gradient(circle at center, #1a1a1a 0%, #0a0a0a 100%); }
        .hero h1 { font-size: clamp(3rem, 10vw, 6rem); font-weight: 900; margin-bottom: 20px; background: linear-gradient(to right, #fff, var(--accent)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .scroll-btn { margin-top: 30px; background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 15px 40px; border-radius: 50px; cursor: pointer; transition: 0.4s; font-weight: 600; }
        .scroll-btn:hover { background: var(--accent); color: #000; }

        /* --- SOCIAL GRID --- */
        .content { max-width: 1000px; margin: 0 auto; padding: 100px 20px; }
        .social-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        .social-pill { background: var(--surface); padding: 25px; border-radius: 20px; display: flex; align-items: center; text-decoration: none; color: white; border: 1px solid #222; transition: 0.3s; }
        .social-pill:hover { border-color: var(--accent); transform: translateY(-5px); box-shadow: 0 10px 30px rgba(212,175,55,0.1); }
        .social-icon { width: 50px; height: 50px; margin-right: 20px; }

        /* --- IMAGE SHOWCASE --- */
        .showcase-container { margin-top: 80px; position: relative; border-radius: 30px; overflow: hidden; border: 1px solid #333; }
        .showcase-image { width: 100%; display: block; transition: 0.8s ease; cursor: zoom-in; }
        .showcase-container:hover .showcase-image { transform: scale(1.05); }

        /* --- FOOTER --- */
        footer { text-align: center; padding: 50px; opacity: 0.5; font-size: 0.9rem; }
    </style>
</head>
<body>

    <nav class="top-bar"><div class="logo">BLINKLE.FUN</div></nav>

    <section class="hero">
        <div>
            <h1>Experience Premium.</h1>
            <button class="scroll-btn" onclick="document.getElementById('main').scrollIntoView({behavior:'smooth'})">Explore Collection</button>
        </div>
    </section>

    <main id="main" class="content">
        <div class="social-grid">
            <!-- Example Item -->
            <a href="#" class="social-pill">
                <div class="social-icon">🔗</div>
                <div><h3>Discord</h3><p>Join the inner circle</p></div>
            </a>
            <!-- Repeat for others -->
        </div>

        <div class="showcase-container">
            <img src="images/wow.png" alt="Showcase" class="showcase-image">
        </div>
    </main>

    <footer>&copy; 2026 Blinkle.fun All rights reserved.</footer>
</body>
</html>
