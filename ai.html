<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkle.fun - Premium Update</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* --- GLOBAL SETTINGS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        html { scroll-behavior: smooth; }
        body { background-color: #1a1a1a; color: #f0f0f0; overflow-x: hidden; }

        /* --- CHARACTER BOUNCE --- */
        #scroll-char {
            position: fixed; bottom: -800px; left: 20px; width: 350px; z-index: 50;
            pointer-events: none; transition: bottom 0.5s ease-in, transform 0.3s ease;
        }
        @keyframes popUp {
            0% { bottom: -800px; transform: scale(0.8); }
            60% { bottom: 20px; transform: scale(1.05); }
            80% { bottom: -5px; transform: scale(0.98); }
            100% { bottom: 0px; transform: scale(1); }
        }
        #scroll-char.visible { bottom: 0; animation: popUp 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* --- TOP BAR & HERO --- */
        .top-bar { background-color: #a38f78; color: white; padding: 15px 30px; font-weight: 900; font-size: 1.4rem; position: fixed; top: 0; width: 100%; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.4); display: flex; justify-content: space-between; align-items: center; }
        .hero { height: 100vh; position: relative; background-image: url('images/image_93eb2c.png'); background-size: cover; background-position: center; background-attachment: fixed; background-blend-mode: multiply; background-color: rgba(0, 0, 0, 0.45); }
        .hero-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 2; width: 90%; }
        .hero h1 { font-size: 5rem; font-weight: 900; color: white; letter-spacing: 3px; text-shadow: 0 6px 15px rgba(0,0,0,0.9); margin-bottom: 30px; }
        .scroll-btn { background-color: #a38f78; color: white; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: 700; border-radius: 50px; cursor: pointer; transition: all 0.3s ease; text-transform: uppercase; }
        .scroll-btn:hover { background-color: #c4ae95; transform: translateY(-5px); }

        /* --- CONTENT & LINE BACKGROUND --- */
        .content-area { background-color: #242424; padding: 120px 40px; min-height: 100vh; position: relative; overflow: hidden; }
        .content-area::before { 
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            background-image: linear-gradient(45deg, rgba(163,143,120,0.1) 25%, transparent 25%, transparent 50%, rgba(163,143,120,0.1) 50%, rgba(163,143,120,0.1) 75%, transparent 75%, transparent); 
            background-size: 50px 50px; animation: moveLines 4s linear infinite; pointer-events: none; 
        }
        @keyframes moveLines { from { background-position: 0 0; } to { background-position: 50px 50px; } }

        /* --- SOCIAL GRID --- */
        .section-title { text-align: center; font-size: 3rem; font-weight: 900; color: #a38f78; margin-bottom: 60px; text-transform: uppercase; z-index: 1; position: relative; }
        .social-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }
        .social-pill { display: flex; align-items: center; background: linear-gradient(145deg, #333, #262626); border-radius: 60px; padding: 10px 30px 10px 10px; text-decoration: none; border: 1px solid #444; transition: 0.3s; }
        .social-pill:hover { transform: translateY(-5px) scale(1.02); background: linear-gradient(145deg, #3a3a3a, #2a2a2a); }
        .social-icon { width: 80px; height: 80px; border-radius: 50%; background: #1a1a1a; display: flex; justify-content: center; align-items: center; border: 2px solid #555; }
        .social-icon img { width: 60%; }
        .social-text { margin-left: 20px; }
        
        /* --- FOOTER & RESPONSIVE --- */
        .bottom-bar { width: 100%; background-color: #121212; padding: 30px 40px; border-top: 2px solid #3a3a3a; z-index: 100; position: relative; }
        @media (max-width: 768px) { 
            .social-grid { grid-template-columns: 1fr; } 
            .hero h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <img id="scroll-char" src="images/belnooo.png" alt="Character">
    <header class="top-bar"><span>Blinkle.fun</span></header>

    <section class="hero">
        <div class="hero-content">
            <h1>WELCOME TO BLINKLE.FUN!</h1>
            <button class="scroll-btn" onclick="scrollToContent()">Explore ↓</button>
        </div>
    </section>

    <main id="main-content" class="content-area">
        <h2 class="section-title">Stay Connected</h2>
        <div class="social-grid">
            <a href="https://discord.gg/xzTR7yYUQK" target="_blank" class="social-pill"><div class="social-icon"><img src="images/discord.png"></div><div class="social-text"><h3>Discord</h3><p>Join the Belno Fan Club</p></div></a>
            <a href="https://steamcommunity.com/id/Varloxy/" target="_blank" class="social-pill"><div class="social-icon"><img src="images/steam.png"></div><div class="social-text"><h3>Steam</h3><p>Add me if you want!</p></div></a>
            <a href="https://www.tiktok.com/@whatheheck15" target="_blank" class="social-pill"><div class="social-icon"><img src="images/tiktok.png"></div><div class="social-text"><h3>TikTok</h3><p>My account!</p></div></a>
            <a href="https://www.roblox.com/users/1408113086/profile" target="_blank" class="social-pill"><div class="social-icon"><img src="images/roblox.png"></div><div class="social-text"><h3>Roblox</h3><p>My profile</p></div></a>
        </div>
    </main>

    <script>
        function scrollToContent() { document.getElementById('main-content').scrollIntoView({ behavior: 'smooth' }); }
        window.addEventListener('scroll', function() {
            const char = document.getElementById('scroll-char');
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50) {
                char.classList.add('visible');
            } else {
                char.classList.remove('visible');
            }
        });
    </script>
</body>
</html>
