<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkle.fun - Enhanced</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- GLOBAL SETTINGS & SMOOTH SCROLL --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif; 
        }

        html {
            scroll-behavior: smooth; 
        }

        body {
            background-color: #1a1a1a; 
            color: #f0f0f0;
            overflow-x: hidden;
        }

        /* --- MODERN SCROLLBAR --- */
        ::-webkit-scrollbar {
            width: 14px;
        }
        ::-webkit-scrollbar-track {
            background: #242424; 
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #a38f78; 
            border-radius: 10px;
            border: 4px solid #242424; 
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #b6a48f; 
        }

        /* --- TOP BAR --- */
        .top-bar {
            background-color: #a38f78; 
            color: white;
            padding: 15px 30px;
            font-weight: 900;
            font-size: 1.4rem;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* --- HERO SECTION --- */
        .hero {
            height: 100vh;
            position: relative;
            background-image: url('images/image_93eb2c.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-blend-mode: multiply;
            background-color: rgba(0, 0, 0, 0.45);
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.6) 100%);
            z-index: 1;
        }

        .hero-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
            width: 90%;
        }

        .hero h1 {
            font-size: 5rem;
            font-weight: 900;
            color: white;
            letter-spacing: 3px;
            text-shadow: 0 6px 15px rgba(0,0,0,0.9);
            margin-bottom: 30px;
        }

        /* --- NICE AUTO-SCROLL BUTTON --- */
        .scroll-btn {
            background-color: #a38f78;
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .scroll-btn:hover {
            background-color: #c4ae95;
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.7);
        }

        .scroll-btn:active {
            transform: translateY(0);
        }

        /* --- CONTENT AREA (SOCIAL LINKS) --- */
        .content-test {
            background-color: #242424;
            padding: 120px 40px;
            min-height: 100vh;
        }

        .section-title {
            text-align: center;
            font-size: 3rem;
            font-weight: 900;
            color: #a38f78;
            margin-bottom: 60px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* --- 2x2 SOCIAL GRID --- */
        .social-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        /* --- PILL SHAPED BUTTONS --- */
        .social-pill {
            display: flex;
            align-items: center;
            background: linear-gradient(145deg, #333333, #262626);
            border-radius: 60px;
            padding: 10px;
            padding-right: 30px;
            text-decoration: none;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
            border: 1px solid #444;
            transition: transform 0.3s ease, box-shadow 0.3s ease, background 0.3s ease;
        }

        .social-pill:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 25px rgba(0,0,0,0.6);
            background: linear-gradient(145deg, #3a3a3a, #2a2a2a);
        }

        /* Logo Circle (Supports 200x200 images, scales down to fit) */
        .social-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background-color: #1a1a1a;
            box-shadow: inset 0 4px 8px rgba(0,0,0,0.6);
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid #555;
        }

        .social-icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Text Area Inside Button */
        .social-text {
            margin-left: 20px;
            display: flex;
            flex-direction: column;
        }

        .social-text h3 {
            font-size: 1.5rem;
            color: #ffffff;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .social-text p {
            font-size: 0.85rem;
            color: #a38f78;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* --- STANDARD BOTTOM BAR --- */
        .bottom-bar {
            width: 100%;
            background-color: #121212;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 30px 40px;
            font-size: 1rem;
            border-top: 2px solid #3a3a3a;
        }

        .footer-logo {
            font-weight: 900;
            color: #a38f78;
        }

        .footer-links {
            display: flex;
            gap: 20px;
        }

        .footer-links a {
            color: #b0b0b0;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: white;
        }

        /* --- RESPONSIVE DESIGN (Turns to 1 column on phones) --- */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 3rem;
            }
            .section-title {
                font-size: 2.2rem;
            }
            .social-grid {
                grid-template-columns: 1fr; /* Stacks the buttons vertically */
            }
            .bottom-bar {
                flex-direction: column;
                gap: 15px;
                padding: 20px;
                text-align: center;
            }
        }
    </style>
</head>
<body>

    <!-- Top Navigation -->
    <header class="top-bar">
        <span>Blinkle.fun</span>
    </header>

    <!-- Main Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>WELCOME TO BLINKLE.FUN!</h1>
            
            <button class="scroll-btn" onclick="scrollToContent()">
                Explore <span>↓</span>
            </button>
        </div>
    </section>

    <!-- New Social Grid Area -->
    <main id="main-content" class="content-test">
        <h2 class="section-title">Stay Connected</h2>
        
        <div class="social-grid">
            
            <!-- Discord Button -->
            <a href="#" class="social-pill">
                <div class="social-icon">
                    <img src="images/discord.png" alt="Discord Logo">
                </div>
                <div class="social-text">
                    <h3>Discord Server</h3>
                    <p>Join Our Community</p>
                </div>
            </a>

            <!-- Steam Button -->
            <a href="#" class="social-pill">
                <div class="social-icon">
                    <img src="images/steam.png" alt="Steam Logo">
                </div>
                <div class="social-text">
                    <h3>Steam Community</h3>
                    <p>Connect & Join Us</p>
                </div>
            </a>

            <!-- TikTok Button -->
            <a href="#" class="social-pill">
                <div class="social-icon">
                    <img src="images/tiktok.png" alt="TikTok Logo">
                </div>
                <div class="social-text">
                    <h3>TikTok Profile</h3>
                    <p>Follow Our Feed</p>
                </div>
            </a>

            <!-- Roblox Button -->
            <a href="#" class="social-pill">
                <div class="social-icon">
                    <img src="images/roblox.png" alt="Roblox Logo">
                </div>
                <div class="social-text">
                    <h3>Roblox Group</h3>
                    <p>Explore Our Content</p>
                </div>
            </a>

        </div>
    </main>

    <!-- Standard Footer -->
    <footer class="bottom-bar">
        <div class="footer-logo">Blinkle.fun Premium</div>
        <div class="footer-copy">&copy; 2026 Blinkle.fun | Premium Update</div>
        <div class="footer-links">
            <a href="#">Terms</a>
            <a href="#">Privacy</a>
            <a href="#">Support</a>
        </div>
    </footer>

    <!-- JavaScript to make the button scroll smoothly -->
    <script>
        function scrollToContent() {
            document.getElementById('main-content').scrollIntoView({ behavior: 'smooth' });
        }
    </script>

</body>
</html>
