<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkle.fun - Stay Connected</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; }
        body { background-color: #1a1a1a; color: #f0f0f0; }

        .content-area { padding: 100px 40px; }
        .section-title { text-align: center; font-size: 3rem; color: #a38f78; margin-bottom: 60px; }

        .social-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            max-width: 900px;
            margin: 0 auto;
        }

        .social-pill {
            display: flex;
            align-items: center;
            background: #262626;
            border-radius: 60px;
            padding: 10px;
            text-decoration: none;
            border: 1px solid #444;
            transition: 0.3s;
        }

        .social-pill:hover { background: #333; transform: translateY(-5px); }

        .social-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            border: 2px solid #555;
        }

        /* FIXED ICON SIZING */
        .social-icon img {
            width: 60%;
            height: 60%;
            object-fit: contain;
        }

        .icon-discord { width: 70%; }
        .icon-tiktok { width: 55%; }
        .icon-roblox { width: 80%; }

        .social-text { margin-left: 20px; }
        .social-text h3 { color: #fff; font-size: 1.2rem; }
        .social-text p { color: #a38f78; font-size: 0.8rem; text-transform: uppercase; }

        @media (max-width: 768px) { .social-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <main class="content-area">
        <h2 class="section-title">STAY CONNECTED</h2>
        
        <div class="social-grid">
            <!-- Discord -->
            <a href="https://discord.com" target="_blank" class="social-pill">
                <div class="social-icon">
                    <img src="images/discord.png" alt="Discord" class="icon-discord">
                </div>
                <div class="social-text">
                    <h3>Discord Server</h3>
                    <p>Join Our Community</p>
                </div>
            </a>

            <!-- Steam -->
            <a href="https://steamcommunity.com" target="_blank" class="social-pill">
                <div class="social-icon">
                    <img src="images/steam.png" alt="Steam">
                </div>
                <div class="social-text">
                    <h3>Steam Community</h3>
                    <p>Connect & Join Us</p>
                </div>
            </a>

            <!-- TikTok -->
            <a href="https://tiktok.com" target="_blank" class="social-pill">
                <div class="social-icon">
                    <img src="images/tiktok.png" alt="TikTok" class="icon-tiktok">
                </div>
                <div class="social-text">
                    <h3>TikTok Profile</h3>
                    <p>Follow Our Feed</p>
                </div>
            </a>

            <!-- Roblox -->
            <a href="https://roblox.com" target="_blank" class="social-pill">
                <div class="social-icon">
                    <img src="images/roblox.svg" alt="Roblox" class="icon-roblox">
                </div>
                <div class="social-text">
                    <h3>Roblox Group</h3>
                    <p>Explore Our Content</p>
                </div>
            </a>
        </div>
    </main>

</body>
</html>
