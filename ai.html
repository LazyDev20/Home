<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blinkle.fun</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<body>

    <header class="top-bar">Blinkle.fun</header>

    <section class="hero">
        <div>
            <h1>WELCOME TO BLINKLE.FUN!</h1>
            <button class="scroll-btn" onclick="scrollToContent()">Explore ↓</button>
        </div>
    </section>

    <main id="main-content" class="content-area">
        <div class="social-grid">
            <a href="https://discord.gg/xzTR7yYUQK" class="social-pill">
                <div class="social-icon"><img src="images/discord.png" alt="D"></div>
                <div><h3>Discord Server</h3><p>Join the Belno Fan Club</p></div>
            </a>
            <a href="https://steamcommunity.com/id/Varloxy/" class="social-pill">
                <div class="social-icon"><img src="images/steam.png" alt="S"></div>
                <div><h3>Steam Profile</h3><p>Add me if you want!</p></div>
            </a>
            <a href="https://www.tiktok.com/@whatheheck15" class="social-pill">
                <div class="social-icon"><img src="images/tiktok.png" alt="T"></div>
                <div><h3>TikTok</h3><p>My tiktok account!</p></div>
            </a>
            <a href="https://www.roblox.com/users/1408113086/profile" class="social-pill">
                <div class="social-icon"><img src="images/roblox.png" alt="R"></div>
                <div><h3>Roblox</h3><p>My roblox profile</p></div>
            </a>
        </div>
    </main>

    <script>
        function scrollToContent() { document.getElementById('main-content').scrollIntoView({ behavior: 'smooth' }); }
    </script>
</body>
</html>
