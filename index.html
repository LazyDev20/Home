<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click on belno..</title>
    
    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="images/icon2.jpg">

    <!-- LINK TO YOUR EXTERNAL CSS -->
    <link rel="stylesheet" href="index.css">
</head>
<body>

    <div class="container" id="main-card">
        <h1>Blinkle was here</h1>
        
        <!-- CLICKABLE IMAGE LINK -->
        <a href="javascript:void(0)" onclick="transitionAndRedirect('https://blinkle.fun/home')">
            <img src="images/texty.png" alt="Blinkle's Picture" class="my-image">
        </a>
    </div>

    <script>
        function transitionAndRedirect(url) {
            const card = document.getElementById('main-card');
            
            // Add the animation class
            card.classList.add('fade-out');
            
            // Wait 400ms for the animation to finish before redirecting
            setTimeout(() => {
                window.location.href = url;
            }, 400);
        }
    </script>

</body>
</html>
