<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        /* --- GLOBAL SETTINGS --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; -webkit-tap-highlight-color: transparent; }
        html { scroll-behavior: smooth; }
        body { background-color: #1a1a1a; color: #f0f0f0; overflow-x: hidden; }

        /* --- CHARACTER ANIMATION --- */
        #scroll-char {
            position: fixed;
            bottom: -800px; 
            left: 20px;
            width: 350px;
            z-index: 5;
            pointer-events: none;
            transition: bottom 0.8s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        #scroll-char.visible { bottom: 0; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            .hero h1 { font-size: 3rem !important; }
            #scroll-char { width: 180px; left: 0px; }
            .social-grid { grid-template-columns: 1fr !important; padding: 0 20px; }
            .top-bar { padding: 10px 20px; font-size: 1.1rem; }
        }

        /* --- STYLES --- */
        .top-bar { background-color: #a38f78; color: white; padding: 15px 30px; font-weight: 900; font-size: 1.4rem; position: fixed; top: 0; width: 100%; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.4); display: flex; justify-content: space-between; align-items: center; }
        .hero { height: 100vh; position: relative; background-image: url('images/image_93eb2c.png'); background-size: cover; background-position: center; background-repeat: no-repeat; background-attachment: fixed; background-blend-mode: multiply; background-color: rgba(0, 0, 0, 0.45); }
        .hero-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 2; width: 90%; }
        .hero h1 { font-size: 5rem; font-weight: 900; color: white; letter-spacing: 3px; text-shadow: 0 6px 15px rgba(0,0,0,0.9); margin-bottom: 30px; }
        
        .scroll-btn { background-color: #a38f78; color: white; border: none; padding: 15px 40px; font-size: 1.2rem; font-weight: 700; border-radius: 50px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: 0.3s; text-transform: uppercase; letter-spacing: 2px; display: inline-flex; align-items: center; gap: 10px; }
        .scroll-btn img { vertical-align: middle; }
        .scroll-btn:hover { background-color: #8c7a67; }

        .content-area { background-color: #242424; padding: 120px 40px; min-height: 100vh; position: relative; overflow: hidden; }
        .section-title { text-align: center; font-size: 3rem; font-weight: 900; color: #a38f78; margin-bottom: 60px; text-transform: uppercase; }
        
        .social-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; max-width: 900px; margin: 0 auto; }
        .social-pill { display: flex; align-items: center; background: linear-gradient(145deg, #333333, #262626); border-radius: 60px; padding: 10px; padding-right: 30px; text-decoration: none; border: 1px solid #444; transition: 0.3s; }
        .social-pill:hover { transform: translateY(-5px); border-color: #a38f78; box-shadow: 0 5px 15px rgba(163, 143, 120, 0.3); }
        
        .social-icon { width: 80px; height: 80px; border-radius: 50%; background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; border: 2px solid #555; flex-shrink: 0; }
        .social-icon img { width: 60%; height: 60%; object-fit: contain; }
        
        .social-text { margin-left: 20px; }
        .social-text h3 { font-size: 1.5rem; color: #ffffff; font-weight: 700; }
        .social-text p { font-size: 0.85rem; color: #a38f78; text-transform: uppercase; font-weight: 700; }
        
        .showcase-container { max-width: 1000px; margin: 80px auto 0 auto; padding: 0 20px; }
        .showcase-image { width: 100%; border-radius: 20px; transition: 0.4s; cursor: zoom-in; }
        .showcase-image:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 2000; justify-content: center; align-items: center; cursor: zoom-out; }
        #lightbox img { max-width: 90%; max-height: 90%; border-radius: 10px; }
        
        .bottom-bar { width: 100%; background-color: #121212; padding: 30px 40px; border-top: 2px solid #3a3a3a; position: relative; z-index: 10; }
        .footer-logo { font-weight: 900; color: #a38f78; }
    </style>
</head>
<body>

    <img id="scroll-char" src="images/belnooo.png" alt="Character">
    <header class="top-bar"><span>Blinkle.fun</span></header>

    <section class="hero">
        <div class="hero-content">
            <h1>WELCOME TO BLINKLE.FUN!</h1>
            <button class="scroll-btn" onclick="scrollToContent()">
                <img src="images/icon.png" alt="Explore" style="width: 20px; height: 20px;">
                Explore
            </button>
        </div>
    </section>

    <main id="main-content" class="content-area">
        <h2 class="section-title">Socials</h2>
        <div class="social-grid">
            <a href="https://discord.gg/xzTR7yYUQK" target="_blank" class="social-pill"><div class="social-icon"><img src="images/discord.png" alt="Discord"></div><div class="social-text"><h3>Discord Server</h3><p>Join the Belno Fan Club</p></div></a>
            <a href="https://steamcommunity.com/id/Varloxy/" target="_blank" class="social-pill"><div class="social-icon"><img src="images/steam.png" alt="Steam"></div><div class="social-text"><h3>Steam Profile</h3><p>Add me if you want!</p></div></a>
            <a href="https://www.tiktok.com/@whatheheck15" target="_blank" class="social-pill"><div class="social-icon"><img src="images/tiktok.png" alt="TikTok"></div><div class="social-text"><h3>TikTok</h3><p>My tiktok account!</p></div></a>
            <a href="https://www.roblox.com/users/1408113086/profile" target="_blank" class="social-pill"><div class="social-icon"><img src="images/roblox.png" alt="Roblox"></div><div class="social-text"><h3>Roblox</h3><p>My roblox profile</p></div></a>
        </div>
        <div class="showcase-container">
            <img src="images/wow.png" alt="Showcase" class="showcase-image" onclick="openLightbox()">
        </div>
    </main>

    <div id="lightbox" onclick="this.style.display='none'"><img src="images/wow.png" alt="Full Preview"></div>

    <footer class="bottom-bar">
        <div class="footer-logo">Belno is the best uma bro</div>
    </footer>

    <script>
        function scrollToContent() { document.getElementById('main-content').scrollIntoView({ behavior: 'smooth' }); }
        function openLightbox() { document.getElementById('lightbox').style.display = 'flex'; }
        window.addEventListener('scroll', function() {
            const char = document.getElementById('scroll-char');
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50) {
                char.classList.add('visible');
            } else {
                char.classList.remove('visible');
            }
        });
    </script>
</body>
</html>
